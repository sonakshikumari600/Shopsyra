name: user_shopsyra
description: A new Flutter project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  rxdart: ^0.27.7

  # Image picker for uploading shop image
  image_picker: ^1.0.4

  # Cached network image (optional, for showing images efficiently)
  cached_network_image: ^3.3.0

  # Firebase core for initialization
  firebase_core: ^4.6.0

  # Firebase Authentication
  firebase_auth: ^6.3.0

  # Cloud Firestore for storing shop info
  cloud_firestore: ^6.2.0

  # Firebase Storage for uploading shop images
  firebase_storage: ^13.2.0

  http: ^1.2.0
  http_parser: ^4.0.0

  # Location & Maps
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.5.0
  google_maps_flutter_web: ^0.5.4
  
  # Payment
  razorpay_flutter: ^1.3.6
  
  # URL Launcher for maps
  url_launcher: ^6.2.4
  
  # ML Kit for Visual Search
  google_mlkit_image_labeling: ^0.11.0
  google_mlkit_object_detection: ^0.12.0
  camera: ^0.10.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  timeago: ^3.6.0 

flutter:
  uses-material-design: true
  assets:
    - assets/landing_page.png
    - assets/landingpage.jpg
    - assets/loginsignup.png